services:
  rest-server:
    image: restic/rest-server@sha256:e117e428e511e3ffdeb6d0e578adf4b468803c77ad500993bb8f15038b2d9db3
    container_name: grabowski-rest-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:8000"
    volumes:
      - ./data:/data
    environment:
      OPTIONS: >-
        --append-only
        --private-repos
        --max-size 32212254720
        --log -
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
