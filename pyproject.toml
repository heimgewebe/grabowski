[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "grabowski-mcp"
version = "0.1.0"
description = "Local MCP operator for the Heim-PC"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "mcp==1.27.2"
]

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = [
  "grabowski_artifacts",
  "grabowski_capabilities",
  "grabowski_checkouts",
  "grabowski_chronik",
  "grabowski_fleet",
  "grabowski_friction",
  "grabowski_mcp",
  "grabowski_operations",
  "grabowski_operator",
  "grabowski_privileged",
  "grabowski_privileged_broker",
  "grabowski_privileged_status_core",
  "grabowski_read_surface",
  "grabowski_recovery",
  "grabowski_resources",
  "grabowski_runtime_extensions",
  "grabowski_self_deploy",
  "grabowski_task_reconcile",
  "grabowski_tasks",
  "grabowski_worker_process",
  "grabowski_workers",
]
