[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "grabowski-mcp"
version = "0.1.0"
description = "Local MCP operator for the Heim-PC"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "mcp==1.27.2"
]

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = ["grabowski_mcp", "grabowski_operator", "grabowski_chronik"]
