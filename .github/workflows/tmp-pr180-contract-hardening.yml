name: temporary PR 180 contract hardening

on:
  pull_request:

permissions:
  contents: write

jobs:
  harden:
    if: github.head_ref == 'feat/repobrief-benchmark-runner-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Apply exact request and fixture hardening
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old in text:
                  return text.replace(old, new, 1)
              if new in text:
                  return text
              raise SystemExit(f"missing patch anchor: {label}")

          runner_path = Path("tools/repobrief_agent_benchmark_runner.py")
          text = runner_path.read_text(encoding="utf-8")
          text = replace_once(
              text,
              'RECEIPT_KIND = "repobrief.agent_benchmark_run_receipt"\nVERSION = "1.0"\n',
              'RECEIPT_KIND = "repobrief.agent_benchmark_run_receipt"\n'
              'FIXTURE_REPORT_KIND = "repobrief.agent_benchmark_fixture_report"\n'
              'VERSION = "1.0"\n',
              "fixture kind",
          )
          text = replace_once(
              text,
              'MAX_TOOL_CALLS = 1000\n',
              'MAX_TOOL_CALLS = 1000\nMAX_PLANNED_REQUESTS = 128\n',
              "planned request limit",
          )
          old_identity = '''    _require_string(request.get("request_id"), "request_id")
              _require_string(request.get("pair_id"), "pair_id")
              _require_string(request.get("case_id"), "case_id")
              _require_string(request.get("session_id"), "session_id")
              _require_string(request.get("workspace_id"), "workspace_id")
              _require_string(request.get("prompt"), "prompt", maximum=4000)
              _validate_hex(request.get("taskset_sha256"), "taskset_sha256", length=64)
              _require_int(request.get("order"), "order", minimum=1)
              _require_int(request.get("repetition"), "repetition", minimum=1)
          '''.replace("              ", "")
          new_identity = '''    taskset_id = _require_string(request.get("taskset_id"), "taskset_id")
              case_id = _require_string(request.get("case_id"), "case_id")
              repetition = _require_int(request.get("repetition"), "repetition", minimum=1)
              if repetition not in {1, 2}:
                  raise RunnerError("request repetition must be 1 or 2")
              order = _require_int(request.get("order"), "order", minimum=1)
              if order not in {1, 2}:
                  raise RunnerError("request order must be 1 or 2")
              pair_id = _require_string(request.get("pair_id"), "pair_id")
              expected_pair_id = f"{taskset_id}:{case_id}:r{repetition}"
              if pair_id != expected_pair_id:
                  raise RunnerError("request pair_id does not match benchmark identity")
              request_id = _require_string(request.get("request_id"), "request_id")
              expected_request_id = f"{pair_id}:{condition}"
              if request_id != expected_request_id:
                  raise RunnerError("request request_id does not match benchmark identity")
              session_id = _require_string(request.get("session_id"), "session_id")
              workspace_id = _require_string(request.get("workspace_id"), "workspace_id")
              if session_id != f"session:{request_id}":
                  raise RunnerError("request session_id does not match request_id")
              if workspace_id != f"workspace:{request_id}":
                  raise RunnerError("request workspace_id does not match request_id")
              _require_string(request.get("prompt"), "prompt", maximum=4000)
              _validate_hex(request.get("taskset_sha256"), "taskset_sha256", length=64)
              if _list(request.get("does_not_establish")) != list(DOES_NOT_ESTABLISH):
                  raise RunnerError("request does_not_establish contract mismatch")
          '''.replace("              ", "")
          text = replace_once(text, old_identity, new_identity, "request identity")

          load_anchor = '''def load_repository_root(request: Mapping[str, Any], map_path: Path) -> Path:
          '''.replace("          ", "")
          planned_loader = '''def load_planned_request(
              request: Mapping[str, Any], request_root: Path
          ) -> Mapping[str, Any]:
              if request_root.is_symlink():
                  raise RunnerError("request root must not be a symlink")
              root = request_root.expanduser().resolve()
              if not root.is_dir():
                  raise RunnerError("request root is not a directory")
              matches: list[Mapping[str, Any]] = []
              count = 0
              for path in sorted(root.glob("*.json")):
                  count += 1
                  if count > MAX_PLANNED_REQUESTS:
                      raise RunnerError("request root exceeds planned request limit")
                  if path.is_symlink() or not path.is_file():
                      raise RunnerError("request root contains an unsafe JSON entry")
                  candidate = _load_object(path)
                  if candidate.get("request_id") == request.get("request_id"):
                      matches.append(candidate)
              if len(matches) != 1:
                  raise RunnerError("request root must contain exactly one matching request")
              planned = matches[0]
              if _canonical_json(planned) != _canonical_json(request):
                  raise RunnerError("stdin request does not match the frozen plan request")
              return planned


          '''.replace("          ", "")
          if planned_loader not in text:
              if load_anchor not in text:
                  raise SystemExit("missing patch anchor: planned request loader")
              text = text.replace(load_anchor, planned_loader + load_anchor, 1)

          fixture_anchor = '''def _transcript_path(request: Mapping[str, Any], transcript_root: Path) -> tuple[Path, str]:
          '''.replace("          ", "")
          fixture_builder = '''def build_fixture_report(
              request: Mapping[str, Any], receipt: Mapping[str, Any]
          ) -> dict[str, Any]:
              candidate = json.loads(json.dumps(receipt))
              provider = _mapping(candidate.get("provider"))
              candidate["provider"] = {
                  **provider,
                  "name": "synthetic-fixture",
                  "token_source": "synthetic",
              }
              return {
                  "kind": FIXTURE_REPORT_KIND,
                  "version": VERSION,
                  "request_id": request["request_id"],
                  "synthetic_fixture": True,
                  "normalized_candidate": candidate,
                  "does_not_establish": list(DOES_NOT_ESTABLISH),
              }


          '''.replace("          ", "")
          if fixture_builder not in text:
              if fixture_anchor not in text:
                  raise SystemExit("missing patch anchor: fixture report")
              text = text.replace(fixture_anchor, fixture_builder + fixture_anchor, 1)

          old_execute_signature = '''def execute(
              request: Mapping[str, Any],
              *,
              repository_map: Path,
              state_root: Path,
          '''.replace("              ", "")
          new_execute_signature = '''def execute(
              request: Mapping[str, Any],
              *,
              request_root: Path,
              repository_map: Path,
              state_root: Path,
          '''.replace("              ", "")
          text = replace_once(
              text, old_execute_signature, new_execute_signature, "execute request root"
          )
          text = replace_once(
              text,
              '''    validate_request(request)
              source = load_repository_root(request, repository_map)
          '''.replace("              ", ""),
              '''    validate_request(request)
              load_planned_request(request, request_root)
              source = load_repository_root(request, repository_map)
          '''.replace("              ", ""),
              "execute plan binding",
          )
          old_return = '''    return build_receipt(
              request,
              stdout,
              transcript_artifact=artifact,
              returncode=returncode,
              started_at=started,
              ended_at=ended,
          )
          '''.replace("              ", "")
          new_return = '''    receipt = build_receipt(
              request,
              stdout,
              transcript_artifact=artifact,
              returncode=returncode,
              started_at=started,
              ended_at=ended,
          )
              if stream_fixture is not None:
                  return build_fixture_report(request, receipt)
              return receipt
          '''.replace("              ", "")
          text = replace_once(text, old_return, new_return, "fixture return")
          text = replace_once(
              text,
              '    parser.add_argument("--repository-map", required=True, type=Path)\n',
              '    parser.add_argument("--request-root", required=True, type=Path)\n'
              '    parser.add_argument("--repository-map", required=True, type=Path)\n',
              "request root argument",
          )
          text = replace_once(
              text,
              '''        receipt = execute(
              request,
              repository_map=args.repository_map,
          '''.replace("              ", ""),
              '''        receipt = execute(
              request,
              request_root=args.request_root,
              repository_map=args.repository_map,
          '''.replace("              ", ""),
              "main request root",
          )
          runner_path.write_text(text, encoding="utf-8")

          test_path = Path("tests/test_repobrief_agent_benchmark_runner.py")
          tests = test_path.read_text(encoding="utf-8")
          repo_anchor = '''class RepoBriefAgentBenchmarkRunnerTests(unittest.TestCase):
          '''.replace("          ", "")
          helper = '''def planned_request_root(root: Path, value: dict) -> Path:
              request_root = root / "requests"
              request_root.mkdir()
              filename = value["request_id"].replace(":", "__") + ".json"
              (request_root / filename).write_text(
                  json.dumps(value, sort_keys=True), encoding="utf-8"
              )
              return request_root


          '''.replace("          ", "")
          if helper not in tests:
              if repo_anchor not in tests:
                  raise SystemExit("missing patch anchor: test request helper")
              tests = tests.replace(repo_anchor, helper + repo_anchor, 1)

          method_anchor = '''    def test_build_baseline_command_exposes_only_read_tools(self) -> None:
          '''.replace("          ", "")
          plan_tests = '''    def test_request_identity_is_derived_and_bounded(self) -> None:
              cases = [
                  ("repetition", 3, "repetition must be 1 or 2"),
                  ("order", 3, "order must be 1 or 2"),
                  ("pair_id", "wrong", "pair_id does not match"),
                  ("request_id", "wrong", "request_id does not match"),
                  ("session_id", "wrong", "session_id does not match"),
                  ("workspace_id", "wrong", "workspace_id does not match"),
              ]
              for field, replacement, message in cases:
                  with self.subTest(field=field):
                      value = request()
                      value[field] = replacement
                      with self.assertRaisesRegex(runner.RunnerError, message):
                          runner.validate_request(value)

              value = request()
              value["does_not_establish"] = []
              with self.assertRaisesRegex(runner.RunnerError, "does_not_establish"):
                  runner.validate_request(value)

              def test_load_planned_request_requires_exact_frozen_request(self) -> None:
                  with tempfile.TemporaryDirectory() as temporary:
                      root = Path(temporary)
                      value = request()
                      request_root = planned_request_root(root, value)
                      self.assertEqual(
                          runner.load_planned_request(value, request_root), value
                      )
                      mutated = copy.deepcopy(value)
                      mutated["prompt"] = "post-hoc prompt"
                      with self.assertRaisesRegex(
                          runner.RunnerError, "does not match the frozen plan request"
                      ):
                          runner.load_planned_request(mutated, request_root)

          '''.replace("              ", "")
          if "def test_request_identity_is_derived_and_bounded" not in tests:
              if method_anchor not in tests:
                  raise SystemExit("missing patch anchor: plan tests")
              tests = tests.replace(method_anchor, plan_tests + method_anchor, 1)

          old_execute_test = '''            receipt = runner.execute(
              value,
              repository_map=map_path,
              state_root=root / "state",
              transcript_root=root / "transcripts",
              claude="claude",
              stream_fixture=fixture,
          )
              artifact = root / "transcripts" / receipt["transcript"]["artifact"]
              self.assertEqual(artifact.read_bytes(), fixture.read_bytes())
              self.assertEqual(receipt["status"], "success")
              self.assertEqual(
                  receipt["does_not_establish"], list(runner.DOES_NOT_ESTABLISH)
              )
          '''.replace("              ", "")
          new_execute_test = '''            request_root = planned_request_root(root, value)
              report = runner.execute(
                  value,
                  request_root=request_root,
                  repository_map=map_path,
                  state_root=root / "state",
                  transcript_root=root / "transcripts",
                  claude="claude",
                  stream_fixture=fixture,
              )
              candidate = report["normalized_candidate"]
              artifact = root / "transcripts" / candidate["transcript"]["artifact"]
              self.assertEqual(artifact.read_bytes(), fixture.read_bytes())
              self.assertEqual(report["kind"], runner.FIXTURE_REPORT_KIND)
              self.assertTrue(report["synthetic_fixture"])
              self.assertEqual(candidate["provider"]["name"], "synthetic-fixture")
              self.assertEqual(candidate["provider"]["token_source"], "synthetic")
              self.assertEqual(
                  report["does_not_establish"], list(runner.DOES_NOT_ESTABLISH)
              )
          '''.replace("              ", "")
          tests = replace_once(
              tests, old_execute_test, new_execute_test, "fixture end-to-end test"
          )
          test_path.write_text(tests, encoding="utf-8")

          docs_path = Path("docs/contracts/repobrief-agent-benchmark-runner-v1.md")
          docs = docs_path.read_text(encoding="utf-8")
          input_anchor = '''Unbekannte oder nachträglich ergänzte Felder werden nicht ignoriert.
          '''.replace("          ", "")
          input_addition = '''Unbekannte oder nachträglich ergänzte Felder werden nicht ignoriert.

          Zusätzlich ist `--request-root` verpflichtend. Dieses Verzeichnis enthält die
          von Lenskit erzeugten JSON-Aufträge. Der Runner sucht genau eine Datei mit
          derselben `request_id` und verlangt kanonische Inhaltsgleichheit mit dem
          Standard-Input. Das Planverzeichnis ist damit die lokale Vertrauensquelle für
          Taskset-Hash, Modell, Budget, Repository-Commit und MCP-Argumentliste. Es muss
          operatorverwaltet, unverändert und nicht symbolisch verlinkt sein.
          '''.replace("          ", "")
          docs = replace_once(docs, input_anchor, input_addition, "request root docs")
          old_fixture_docs = '''Dieser Modus belegt:

          - Parser- und Vertragsverhalten;
          '''.replace("          ", "")
          new_fixture_docs = '''Dieser Modus gibt keinen Lenskit-Erfolgsreceipt aus. Er erzeugt einen
          `repobrief.agent_benchmark_fixture_report`; dessen eingebetteter Kandidat trägt
          absichtlich `provider.name=synthetic-fixture` und
          `token_source=synthetic` und ist dadurch mit dem Real-Receipt-Vertrag
          unvereinbar.

          Dieser Modus belegt:

          - Parser- und Vertragsverhalten;
          '''.replace("          ", "")
          docs = replace_once(
              docs, old_fixture_docs, new_fixture_docs, "fixture report docs"
          )
          docs = replace_once(
              docs,
              '''  "/absolute/path/to/tools/repobrief_agent_benchmark_runner.py",
              "--repository-map",
          '''.replace("              ", ""),
              '''  "/absolute/path/to/tools/repobrief_agent_benchmark_runner.py",
              "--request-root",
              "/absolute/path/to/benchmark-plan/requests",
              "--repository-map",
          '''.replace("              ", ""),
              "runner invocation docs",
          )
          docs_path.write_text(docs, encoding="utf-8")
          PY
      - name: Commit contract hardening when changed
        shell: bash
        run: |
          if git diff --quiet -- tools/repobrief_agent_benchmark_runner.py tests/test_repobrief_agent_benchmark_runner.py docs/contracts/repobrief-agent-benchmark-runner-v1.md; then
            echo "contract already hardened"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/repobrief_agent_benchmark_runner.py tests/test_repobrief_agent_benchmark_runner.py docs/contracts/repobrief-agent-benchmark-runner-v1.md
          git commit -m "fix: bind benchmark runner to frozen plan"
          git push origin HEAD:${{ github.head_ref }}
