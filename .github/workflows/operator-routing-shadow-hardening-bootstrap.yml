name: Bootstrap routing-shadow observability hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-validate-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/operator-routing-shadow-observability-hardening-v1
          fetch-depth: 0
      - name: Correct bootstrap guards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/_bootstrap_routing_shadow_hardening.py')
          text = path.read_text(encoding='utf-8')
          old_signature = r')(    \) -> dict\[str, Any\]:)'
          new_signature = r')(\) -> dict\[str, Any\]:)'
          if text.count(old_signature) != 1:
              raise SystemExit(f'bootstrap signature guard count={text.count(old_signature)}')
          text = text.replace(old_signature, new_signature)
          old_backref = "\n\\1'''"
          new_backref = "\n\\\\1'''"
          if text.count(old_backref) != 2:
              raise SystemExit(f'bootstrap replacement backref count={text.count(old_backref)}')
          path.write_text(text.replace(old_backref, new_backref), encoding='utf-8')
          PY
      - name: Apply guarded hardening patch
        id: patch
        continue-on-error: true
        run: python tools/_bootstrap_routing_shadow_hardening.py
      - name: Persist patch diagnostic only
        if: steps.patch.outcome == 'failure'
        shell: bash
        run: |
          cp .routing-shadow-bootstrap-diagnostic.txt /tmp/routing-shadow-bootstrap-diagnostic.txt
          git restore .
          git clean -fd
          cp /tmp/routing-shadow-bootstrap-diagnostic.txt .routing-shadow-bootstrap-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .routing-shadow-bootstrap-diagnostic.txt
          git commit -m "chore: record routing-shadow bootstrap diagnostic" || true
          git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
          exit 1
      - name: Validate focused routing-shadow contracts
        id: focused
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          PYTHONPATH=src python -m unittest tests.test_operator_routing_shadow_cohort > .routing-shadow-test-diagnostic.txt 2>&1
          status=$?
          cat .routing-shadow-test-diagnostic.txt
          exit $status
      - name: Persist focused-test diagnostic only
        if: steps.focused.outcome == 'failure'
        shell: bash
        run: |
          cp .routing-shadow-test-diagnostic.txt /tmp/routing-shadow-test-diagnostic.txt
          git restore .
          git clean -fd
          cp /tmp/routing-shadow-test-diagnostic.txt .routing-shadow-test-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .routing-shadow-test-diagnostic.txt
          git commit -m "chore: record routing-shadow focused-test diagnostic" || true
          git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
          exit 1
      - name: Validate repository
        if: steps.patch.outcome == 'success' && steps.focused.outcome == 'success'
        run: make validate
      - name: Remove bootstrap files and commit validated patch
        if: steps.patch.outcome == 'success' && steps.focused.outcome == 'success'
        shell: bash
        run: |
          rm .github/workflows/operator-routing-shadow-hardening-bootstrap.yml
          rm tools/_bootstrap_routing_shadow_hardening.py
          rm -f .routing-shadow-bootstrap-diagnostic.txt .routing-shadow-test-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: harden routing-shadow observability provenance"
          git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
