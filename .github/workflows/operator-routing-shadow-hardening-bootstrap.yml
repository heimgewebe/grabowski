name: Bootstrap routing-shadow observability hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-validate-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/operator-routing-shadow-observability-hardening-v1
          fetch-depth: 0
      - name: Apply, validate, and commit guarded hardening
        shell: bash
        run: |
          set -eu

          python - <<'PY'
          from pathlib import Path
          path = Path('tools/_bootstrap_routing_shadow_hardening.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (r')(    \) -> dict\[str, Any\]:)', r')(\) -> dict\[str, Any\]:)', 1, 'signature guard'),
              ("\n\\1'''", "\n\\\\1'''", 2, 'replacement backrefs'),
              (r'\n.*?    prospective = eligibility\["prospective_eligibility"\]', r'\n(?:(?!\ndef ).)*?    prospective = eligibility\["prospective_eligibility"\]', 1, 'builder function boundary'),
              (r'\n.*?    if record\.get\("no_effect"\) != NO_EFFECT:', r'\n(?:(?!\ndef ).)*?    if record\.get\("no_effect"\) != NO_EFFECT:', 1, 'validator function boundary'),
          ]
          for old, new, expected, label in replacements:
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'bootstrap {label} count={count}, expected={expected}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

          if ! python tools/_bootstrap_routing_shadow_hardening.py; then
            cp .routing-shadow-bootstrap-diagnostic.txt /tmp/routing-shadow-bootstrap-diagnostic.txt
            git restore .
            git clean -fd
            cp /tmp/routing-shadow-bootstrap-diagnostic.txt .routing-shadow-bootstrap-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .routing-shadow-bootstrap-diagnostic.txt
            git commit -m "chore: record routing-shadow bootstrap diagnostic" || true
            git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
            exit 1
          fi

          if ! python - <<'PY' > /tmp/routing-shadow-scope-diagnostic.txt 2>&1
          from pathlib import Path
          import re
          import subprocess

          path = Path('src/grabowski_operator_routing_shadow_capture.py')
          current = path.read_text(encoding='utf-8')
          original = subprocess.check_output(
              ['git', 'show', 'HEAD:src/grabowski_operator_routing_shadow_capture.py'],
              text=True,
          )

          v2_pattern = r'^def build_shadow_record_v2\(.*?(?=^def validate_shadow_record_v2\()'
          original_v2 = re.search(v2_pattern, original, flags=re.M | re.S)
          if original_v2 is None:
              raise SystemExit('original build_shadow_record_v2 function not found')
          current, count = re.subn(
              v2_pattern,
              lambda _: original_v2.group(0),
              current,
              count=1,
              flags=re.M | re.S,
          )
          if count != 1:
              raise SystemExit(f'current build_shadow_record_v2 function count={count}')

          v3_pattern = r'^def build_shadow_record_v3\(.*?(?=^def validate_shadow_record_v3\()'
          v3_match = re.search(v3_pattern, current, flags=re.M | re.S)
          if v3_match is None:
              raise SystemExit('build_shadow_record_v3 function not found')
          v3 = v3_match.group(0)
          timeline_pattern = (
              r'    normalized_captured_at = _parse_timestamp\(captured_at, "captured_at"\)\n'
              r'    frozen_at = eligibility\["frozen_at"\]\n'
              r'    timeline_values = \[\("outcome observation", normalized_outcome\["observed_at"\]\)\]\n'
              r'(?:(?!\ndef ).)*?'
              r'    prospective = eligibility\["prospective_eligibility"\]'
          )
          replacement = '''    normalized_captured_at = _parse_timestamp(captured_at, "captured_at")
    frozen_at = eligibility["frozen_at"]
    _validate_v3_timeline(
        frozen_at=frozen_at,
        outcome=normalized_outcome,
        execution=execution,
        assessments=assessments,
        captured_at=normalized_captured_at,
    )
    prospective = eligibility["prospective_eligibility"]'''
          v3_updated, count = re.subn(
              timeline_pattern, replacement, v3, count=1, flags=re.S
          )
          if count != 1:
              raise SystemExit(f'v3 builder timeline count={count}')
          current = current[:v3_match.start()] + v3_updated + current[v3_match.end():]
          path.write_text(current, encoding='utf-8')
          PY
          then
            cp /tmp/routing-shadow-scope-diagnostic.txt /tmp/routing-shadow-bootstrap-diagnostic.txt
            git restore .
            git clean -fd
            cp /tmp/routing-shadow-bootstrap-diagnostic.txt .routing-shadow-bootstrap-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .routing-shadow-bootstrap-diagnostic.txt
            git commit -m "chore: record routing-shadow scope diagnostic" || true
            git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
            exit 1
          fi

          set +e
          make validate > /tmp/routing-shadow-validate-diagnostic.txt 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git restore .
            git clean -fd
            cp /tmp/routing-shadow-validate-diagnostic.txt .routing-shadow-validate-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .routing-shadow-validate-diagnostic.txt
            git commit -m "chore: record routing-shadow validation diagnostic" || true
            git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
            exit "$status"
          fi

          rm .github/workflows/operator-routing-shadow-hardening-bootstrap.yml
          rm tools/_bootstrap_routing_shadow_hardening.py
          rm -f .routing-shadow-bootstrap-diagnostic.txt .routing-shadow-test-diagnostic.txt .routing-shadow-validate-diagnostic.txt .routing-shadow-bootstrap-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: harden routing-shadow observability provenance"
          git push origin HEAD:fix/operator-routing-shadow-observability-hardening-v1
