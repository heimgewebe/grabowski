name: Bootstrap cross-process audit lock

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: audit-process-lock-bootstrap
  cancel-in-progress: false

jobs:
  patch-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-process-lock-v1
          fetch-depth: 0

      - name: Apply bounded source and test patch
        run: python tools/bootstrap_audit_process_lock.py

      - name: Capture candidate patch
        run: git diff --binary > audit-process-lock-candidate.patch

      - name: Upload candidate patch
        uses: actions/upload-artifact@v4
        with:
          name: audit-process-lock-candidate-${{ github.run_id }}
          path: audit-process-lock-candidate.patch
          if-no-files-found: error

      - name: Compile candidate
        run: python -m compileall -q src/grabowski_mcp.py tests/test_operator_v2_runtime.py

      - name: Check candidate diff
        run: git diff --check

      - name: Run focused runtime tests
        run: python -m unittest tests/test_operator_v2_runtime.py

      - name: Publish tested branch and remove bootstrap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/audit-process-lock-bootstrap.yml tools/bootstrap_audit_process_lock.py
          git add src/grabowski_mcp.py tests/test_operator_v2_runtime.py
          git commit -m "Harden audit append across processes"
          git push origin HEAD:refs/heads/fix/audit-process-lock-v1
