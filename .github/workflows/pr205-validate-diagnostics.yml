name: PR 205 validation diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture make validate
        shell: bash
        run: |
          set +e
          make validate > pr205-make-validate.log 2>&1
          code=$?
          printf '%s\n' "$code" > pr205-make-validate.exit
          cat pr205-make-validate.log
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr205-make-validate-${{ github.run_id }}
          path: |
            pr205-make-validate.log
            pr205-make-validate.exit
          if-no-files-found: error
