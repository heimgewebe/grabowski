name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate repository
        shell: bash
        run: |
          set -o pipefail
          make validate 2>&1 | tee "validate-${{ matrix.python-version }}.log"

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: pr186-final-validate-${{ matrix.python-version }}-${{ github.run_id }}
          path: validate-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 7

      - name: Prove reproducible deployment staging
        run: make deploy-check
