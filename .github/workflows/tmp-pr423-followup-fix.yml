name: Temporary PR423 follow-up fix

on:
  push:
    branches:
      - fix/pr423-shadow-fail-open

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pr423-shadow-fail-open
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install --disable-pip-version-check -e .
      - name: Apply exact fail-open fix and regression binding
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/grabowski_agent_workspace.py')
          text = source.read_text(encoding='utf-8')
          old = '    _capture_routing_shadow_prospective_best_effort(_manifest(workspace_id))\n'
          new = '    _capture_routing_shadow_prospective_best_effort(manifest)\n'
          if text.count(old) != 1:
              raise SystemExit('expected exactly one vulnerable manifest reread call')
          source.write_text(text.replace(old, new), encoding='utf-8')

          tests = Path('tests/test_operator_routing_shadow_cohort.py')
          text = tests.read_text(encoding='utf-8')
          old = '                "_capture_routing_shadow_prospective_best_effort(_manifest(workspace_id))"\n'
          new = '                "_capture_routing_shadow_prospective_best_effort(manifest)"\n'
          if text.count(old) != 1:
              raise SystemExit('expected exactly one hook-order regression assertion')
          tests.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Refresh generated contracts
        run: make context-refresh
      - name: Validate focused cohort contract
        run: PYTHONPATH=src python -m unittest tests.test_operator_routing_shadow_cohort -v
      - name: Validate patch formatting
        run: git diff --check
      - name: Commit fix and remove temporary workflow
        run: |
          rm .github/workflows/tmp-pr423-followup-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix(shadow): keep prospective capture fully fail-open'
          git push origin HEAD:fix/pr423-shadow-fail-open
