name: PR 205 context refresh

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pr205-context-refresh
  cancel-in-progress: false

jobs:
  refresh-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-process-lock-v1
          fetch-depth: 0
      - name: Refresh generated context
        run: make context-refresh
      - name: Prove bounded generated change
        shell: bash
        run: |
          test "$(git diff --name-only)" = "docs/generated/operator-context.v1.json"
          git diff --check
          python -m unittest tests/test_operator_context.py
      - name: Publish refresh and remove temporary diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/pr205-context-refresh.yml .github/workflows/pr205-validate-diagnostics.yml
          git add docs/generated/operator-context.v1.json
          git commit -m "Refresh generated operator context"
          git push origin HEAD:refs/heads/fix/audit-process-lock-v1
